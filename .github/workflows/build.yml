name: Compile

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build with AHK
        uses: nekocodeX/GitHub-Action-Ahk2Exe@main
        with:
          in: QuickSwitch.ahk
          out: build
          icon: res/icon.ico
      - name: Do Something with builded scripts
        shell: pwsh
        run: |
          ls build
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: my-artifact
          path: ${{ github.workspace }}
      - name: Release
        uses: softprops/action-gh-release@v0.1.15
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/QuickSwitch.exe
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
